<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BioSupport Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    :root{
      --bg1:#f5f8ff;
      --bg2:#eef4ff;
      --panel:rgba(255,255,255,.92);
      --panel-strong:#ffffff;
      --text:#0f172a;
      --muted:#64748b;
      --line:#dbe5f1;
      --brand:#1d4ed8;
      --brand2:#7c3aed;
      --good:#16a34a;
      --warn:#f59e0b;
      --bad:#dc2626;
      --shadow:0 18px 45px rgba(15,23,42,.08);
      --radius:24px;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      min-height:100vh;
      font-family:Inter,ui-sans-serif,system-ui,-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(59,130,246,.12), transparent 26%),
        radial-gradient(circle at top right, rgba(124,58,237,.10), transparent 28%),
        linear-gradient(135deg, var(--bg1), #f8fbff 45%, #f5f8ff);
    }
    a{color:inherit}
    .app{max-width:1440px;margin:0 auto;display:grid;grid-template-columns:280px 1fr;min-height:100vh}
    .sidebar{
      position:sticky;top:0;height:100vh;
      padding:22px 18px;
      background:linear-gradient(180deg,#081f42 0%, #0b2c5f 100%);
      color:#fff;
      box-shadow:inset -1px 0 0 rgba(255,255,255,.06);
      display:flex;flex-direction:column;gap:16px;
    }
    .brand{
      display:flex;gap:12px;align-items:center;padding:4px 4px 10px 4px;
    }
    .logo{
      width:46px;height:46px;border-radius:18px;
      display:grid;place-items:center;
      background:rgba(255,255,255,.12);
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.08);
      font-size:22px;
    }
    .brand h1{margin:0;font-size:20px;line-height:1.1}
    .brand p{margin:4px 0 0;font-size:12px;opacity:.72}
    .side-card{
      border-radius:22px;
      padding:18px;
      background:rgba(255,255,255,.08);
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.08);
    }
    .side-card .small{font-size:12px;opacity:.72}
    .side-card .big{font-size:30px;font-weight:800;margin-top:6px;line-height:1}
    .side-card .row{display:flex;justify-content:space-between;gap:10px;font-size:12px;opacity:.78;margin-top:14px}
    .xpbar{height:8px;border-radius:999px;background:rgba(255,255,255,.12);overflow:hidden;margin-top:8px}
    .xpbar > div{height:100%;width:0;background:linear-gradient(90deg,#22c55e,#38bdf8);border-radius:999px}
    .nav{display:flex;flex-direction:column;gap:8px;flex:1}
    .nav button{
      border:0;cursor:pointer;
      background:transparent;color:rgba(255,255,255,.80);
      padding:14px 14px;border-radius:18px;
      display:flex;align-items:center;gap:12px;
      text-align:left;font-size:14px;font-weight:600;
      transition:.2s ease;
    }
    .nav button:hover,.nav button.active{background:rgba(255,255,255,.12);color:#fff}
    .quote{
      margin-top:auto;
      border-radius:22px;padding:16px 18px;
      background:rgba(255,255,255,.06);
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.05);
      font-size:13px;line-height:1.6;opacity:.92;
    }
    .main{min-width:0}
    .topbar{
      position:sticky;top:0;z-index:20;
      backdrop-filter:blur(20px);
      background:rgba(246,249,253,.84);
      border-bottom:1px solid rgba(219,229,241,.9);
    }
    .topbar-inner{
      padding:18px 26px;
      display:flex;align-items:center;gap:16px;
    }
    .menu{
      display:none;border:1px solid var(--line);background:#fff;border-radius:14px;padding:10px 12px;cursor:pointer
    }
    .welcome{flex:1}
    .welcome h2{margin:0;font-size:20px}
    .welcome p{margin:4px 0 0;color:var(--muted);font-size:13px}
    .search{
      flex:0 1 460px;
      display:flex;align-items:center;gap:10px;
      border:1px solid var(--line);
      background:#fff;border-radius:18px;padding:12px 14px;
      box-shadow:0 3px 16px rgba(15,23,42,.04);
    }
    .search input{border:0;outline:none;background:transparent;width:100%;font-size:14px}
    .user{
      display:flex;align-items:center;gap:12px;
      padding:10px 12px;border:1px solid var(--line);
      background:#fff;border-radius:18px;box-shadow:0 3px 16px rgba(15,23,42,.04);
    }
    .avatar{
      width:42px;height:42px;border-radius:50%;
      background:linear-gradient(135deg,#3b82f6,#8b5cf6);
      display:grid;place-items:center;color:#fff;font-weight:800
    }
    .u-name{font-size:13px;font-weight:700}
    .u-role{font-size:12px;color:var(--muted)}
    .mobile-search{display:none;padding:0 16px 14px}
    .content{padding:22px 26px 28px}
    .grid-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:18px}
    .card{
      background:var(--panel);
      border:1px solid rgba(219,229,241,.88);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
    }
    .stat{padding:18px}
    .stat .row{display:flex;justify-content:space-between;gap:10px}
    .stat .k{font-size:13px;color:var(--muted)}
    .stat .v{font-size:30px;font-weight:800;line-height:1.1;margin-top:10px}
    .section-grid{display:grid;grid-template-columns:1.2fr .9fr;gap:18px;margin-bottom:18px}
    .two-col{display:grid;grid-template-columns:1.15fr .85fr;gap:18px;margin-bottom:18px}
    .card-h{padding:20px 20px 0}
    .card-h h3{margin:0;font-size:20px}
    .card-h p{margin:6px 0 0;color:var(--muted);font-size:13px;line-height:1.55}
    .card-b{padding:18px 20px 20px}
    .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .chip{
      display:inline-flex;align-items:center;gap:8px;
      border:1px solid var(--line);background:#f8fbff;
      border-radius:999px;padding:8px 12px;font-size:12px;color:#3b4a7a
    }
    .btn{
      border:0;cursor:pointer;font:inherit;
      border-radius:16px;padding:12px 16px;font-weight:700;
      transition:.18s ease;
    }
    .btn:hover{transform:translateY(-1px)}
    .btn.primary{background:linear-gradient(90deg,var(--brand),var(--brand2));color:#fff}
    .btn.ghost{background:#fff;border:1px solid var(--line);color:var(--text)}
    .btn.soft{background:#eef4ff;border:1px solid #d5e2ff;color:#1d4ed8}
    .btn.good{background:#ecfdf5;border:1px solid #bbf7d0;color:#166534}
    .btn.warn{background:#fff7ed;border:1px solid #fed7aa;color:#b45309}
    .btn.small{padding:10px 12px;border-radius:14px;font-size:13px}
    .progress-wrap{height:10px;background:#edf3fb;border-radius:999px;overflow:hidden}
    .progress-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--brand),var(--brand2))}
    .task-list{display:flex;flex-direction:column;gap:10px;margin-top:14px}
    .task{
      display:flex;align-items:center;justify-content:space-between;gap:14px;
      padding:14px 14px;border-radius:18px;border:1px solid var(--line);
      cursor:pointer;background:#fff;transition:.18s ease;
    }
    .task:hover{transform:translateY(-1px);box-shadow:0 10px 22px rgba(15,23,42,.06)}
    .task.locked{cursor:default;opacity:.95}
    .task.active{background:#eff6ff;border-color:#bfdbfe}
    .task .left{display:flex;align-items:flex-start;gap:12px;min-width:0}
    .check{
      width:22px;height:22px;border-radius:999px;border:2px solid #cbd5e1;
      display:grid;place-items:center;flex:none;background:#fff;color:#fff;font-size:13px
    }
    .task.active .check{background:#2563eb;border-color:#2563eb}
    .task .title{font-weight:700}
    .task .meta{font-size:12px;color:var(--muted);margin-top:3px}
    .badge{
      padding:6px 10px;border-radius:999px;font-size:12px;border:1px solid var(--line);
      background:#f8fafc;color:#475569;white-space:nowrap
    }
    .badge.good{background:#ecfdf5;border-color:#bbf7d0;color:#166534}
    .badge.blue{background:#eff6ff;border-color:#bfdbfe;color:#1d4ed8}
    .badge.orange{background:#fff7ed;border-color:#fed7aa;color:#c2410c}
    .badge.purple{background:#f5f3ff;border-color:#ddd6fe;color:#6d28d9}
    .mini-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
    .mini{
      border:1px solid var(--line);border-radius:18px;padding:15px;
      background:linear-gradient(180deg,#fff,#fbfdff)
    }
    .mini .lbl{font-size:12px;color:var(--muted)}
    .mini .big{margin-top:8px;font-size:22px;font-weight:800}
    .mini .bar{height:8px;background:#edf3fb;border-radius:999px;overflow:hidden;margin-top:10px}
    .mini .bar>div{height:100%;border-radius:999px}
    .mini-note{margin-top:8px;font-size:12px;color:var(--muted)}
    .calendar{
      display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-top:14px
    }
    .day{
      aspect-ratio:1/1;
      border-radius:14px;border:1px solid var(--line);
      background:#f8fafc;
      padding:8px;display:flex;flex-direction:column;justify-content:space-between;
      font-size:11px;color:var(--muted)
    }
    .day .num{font-weight:700;color:#0f172a}
    .day.done{background:#e0f2fe;border-color:#bae6fd}
    .day.partial{background:#eff6ff;border-color:#bfdbfe}
    .day.none{opacity:.62}
    .day.today{box-shadow:inset 0 0 0 2px rgba(29,78,216,.24)}
    .roadmap{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
    .step{border:1px solid var(--line);border-radius:20px;padding:16px;background:#fff}
    .step.active{background:#eff6ff;border-color:#bfdbfe}
    .step h4{margin:0;font-size:16px}
    .step .lvl{margin-top:4px;font-size:12px;color:var(--muted)}
    .step ul{margin:14px 0 0;padding:0 0 0 18px;color:#475569;line-height:1.7;font-size:13px}
    .products{display:grid;grid-template-columns:repeat(5,1fr);gap:14px}
    .product{
      border:1px solid var(--line);border-radius:22px;padding:16px;background:#fff;
      min-height:210px
    }
    .product .img{
      height:86px;border-radius:18px;background:linear-gradient(180deg,#f8fbff,#edf3fb);
      border:1px solid #e5edf8;display:grid;place-items:center;font-size:34px;margin-bottom:12px
    }
    .product h4{margin:0;font-size:16px}
    .product p{margin:8px 0 0;color:var(--muted);font-size:12px;line-height:1.6}
    .case-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
    .case{border:1px solid var(--line);border-radius:20px;padding:16px;background:#fff}
    .case-top{display:flex;justify-content:space-between;align-items:center;gap:10px}
    .case h4{margin:10px 0 0;font-size:16px}
    .case p{margin:8px 0 0;color:var(--muted);font-size:13px;line-height:1.6}
    .paper-list{display:flex;flex-direction:column;gap:10px}
    .paper{
      display:flex;gap:12px;align-items:center;border:1px solid var(--line);
      background:#fff;border-radius:18px;padding:12px
    }
    .paper .icon-box{
      width:48px;height:48px;border-radius:16px;background:#eef4ff;
      display:grid;place-items:center;font-size:20px;color:#2563eb;flex:none
    }
    .paper .t1{font-size:12px;color:var(--muted);display:flex;justify-content:space-between;gap:10px}
    .paper .t2{margin-top:4px;font-size:14px;font-weight:700;line-height:1.4}
    .fields{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:8px}
    .field textarea,.field input{
      width:100%;padding:14px;border-radius:18px;border:1px solid var(--line);
      outline:none;resize:vertical;font:inherit;background:#fff
    }
    .field textarea{min-height:120px}
    .footer-note{
      margin-top:16px;padding:14px 16px;border-radius:18px;background:#fff7ed;
      border:1px solid #fed7aa;color:#9a3412;font-size:13px;line-height:1.65
    }
    .report-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
    .report-box{
      border:1px solid var(--line);border-radius:18px;padding:16px;background:linear-gradient(180deg,#fff,#fbfdff)
    }
    .report-box h4{margin:0 0 8px;font-size:16px}
    .report-box .desc{font-size:13px;color:var(--muted);line-height:1.6}
    .report-box .score{margin-top:12px;font-size:28px;font-weight:800}
    .toast{
      position:fixed;right:18px;bottom:18px;z-index:50;
      background:#0f172a;color:#fff;padding:12px 14px;border-radius:14px;
      box-shadow:0 14px 40px rgba(15,23,42,.2);opacity:0;transform:translateY(12px);
      pointer-events:none;transition:.25s ease;font-size:13px
    }
    .toast.show{opacity:1;transform:none}
    .overlay{
      display:none;position:fixed;inset:0;background:rgba(15,23,42,.38);z-index:30
    }
    .overlay.show{display:block}
    .muted{color:var(--muted)}
    .section-title{display:flex;align-items:center;justify-content:space-between;gap:12px}
    .section-title .left{display:flex;align-items:center;gap:10px}
    .tiny{font-size:12px;color:var(--muted)}
    .sep{height:1px;background:#eef2f7;margin:16px 0}
    .hidden{display:none !important}

    @media (max-width: 1280px){
      .grid-stats,.mini-grid,.products,.report-grid{grid-template-columns:repeat(2,1fr)}
      .section-grid,.two-col,.roadmap,.fields{grid-template-columns:1fr}
      .case-grid{grid-template-columns:1fr}
    }
    @media (max-width: 880px){
      .app{grid-template-columns:1fr}
      .sidebar{
        position:fixed;left:-300px;top:0;z-index:40;transition:.24s ease;width:280px
      }
      .sidebar.open{left:0}
      .menu{display:inline-flex}
      .topbar-inner{padding:14px 16px}
      .content{padding:14px 16px 22px}
      .mobile-search{display:block}
      .welcome{display:none}
      .user .u-meta{display:none}
      .grid-stats,.mini-grid,.products{grid-template-columns:1fr}
      .calendar{gap:6px}
    }
  </style>
</head>
<body>
  <div class="overlay" id="overlay"></div>
  <div class="toast" id="toast"></div>

  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="logo">🧬</div>
        <div>
          <h1>BioSupport</h1>
          <p>Learn · Solve · Grow</p>
        </div>
      </div>

      <div class="side-card">
        <div class="small">连续打卡</div>
        <div class="big" id="streakValue">0 天</div>
        <div class="row"><span>Lv. 12 技术支持专家</span><span id="xpText">0 / 1000 XP</span></div>
        <div class="xpbar"><div id="xpBar"></div></div>
      </div>

      <nav class="nav" id="nav"></nav>

      <div class="quote">“持续学习，是成为专家的最快路径。”<br/>— BioSupport Tracker</div>
    </aside>

    <main class="main">
      <div class="topbar">
        <div class="topbar-inner">
          <button class="menu" id="menuBtn">☰</button>
          <div class="welcome">
            <h2>欢迎回来</h2>
            <p>把工作间隙的 40 分钟，变成可沉淀的成长资产。</p>
          </div>
          <div class="search">
            <span>🔎</span>
            <input id="searchInput" placeholder="搜索产品、案例、文献、笔记..." />
          </div>
          <div class="user">
            <div class="avatar">GM</div>
            <div class="u-meta">
              <div class="u-name">Grace Ma</div>
              <div class="u-role">Technical Support</div>
            </div>
          </div>
        </div>
      </div>

      <div class="mobile-search">
        <div class="search" style="max-width:none">
          <span>🔎</span>
          <input id="searchInput2" placeholder="搜索产品、案例、文献、笔记..." />
        </div>
      </div>

      <div class="content" id="content"></div>
    </main>
  </div>

<script>
(() => {
  const STORAGE_KEY = 'biosupport-tracker-v6';
  const VERSION = 'v6';
  const TASKS = [
    { id:'paper', label:'阅读一篇论文摘要', minutes:10, points:10 },
    { id:'product', label:'学习一个产品知识点', minutes:10, points:10 },
    { id:'case', label:'分析一个 Troubleshooting Case', minutes:10, points:15 },
    { id:'summary', label:'总结并沉淀到知识库', minutes:10, points:5 },
  ];
  const NAV = [
    { key:'home', label:'首页', icon:'🏠' },
    { key:'daily', label:'每日打卡', icon:'📅' },
    { key:'products', label:'产品学习', icon:'🔬' },
    { key:'cases', label:'Troubleshooting 库', icon:'🧰' },
    { key:'papers', label:'文献管理', icon:'📚' },
    { key:'roadmap', label:'成长路线', icon:'📈' },
    { key:'notes', label:'今日收获', icon:'📝' },
  ];
  const PRODUCTS = [
    { name:'PCR / qPCR', progress:80, modules:'8/10', desc:'基础原理、标准曲线、熔解曲线与常见失败原因' },
    { name:'NGS', progress:65, modules:'13/20', desc:'文库构建、上机、质控与常见排障' },
    { name:'Flow Cytometry', progress:70, modules:'7/10', desc:'补偿、门控、抗体选择与仪器维护' },
    { name:'KingFisher', progress:75, modules:'6/8', desc:'磁珠提取、样本纯化、污染与回收率优化' },
    { name:'Orbitrap MS', progress:60, modules:'9/15', desc:'蛋白质组、扫描模式、参数设置与数据分析' },
  ];
  const CASES = [
    { tag:'qPCR', title:'Ct 值异常偏高或无扩增', date:'2024-05-20', level:'高频问题', summary:'排查模板质量、引物设计、反应体系、退火温度和污染可能。' },
    { tag:'NGS', title:'文库主峰异常或无有效数据', date:'2024-05-18', level:'中等频率', summary:'重点关注片段分布、接头连接效率、定量偏差和测序指标。' },
    { tag:'Flow', title:'信号弱或背景高', date:'2024-05-16', level:'高频问题', summary:'检查补偿、PMT、染色条件、洗涤步骤和细胞状态。' },
    { tag:'KingFisher', title:'提取产量低', date:'2024-05-15', level:'中等频率', summary:'关注磁珠混匀、洗涤次数、样本输入量和乙醇残留。' },
  ];
  const PAPERS = [
    { journal:'Nature', title:'Single-cell multiomic analysis of human tissues', date:'2024-05-20' },
    { journal:'Cell', title:'Spatial multi-omics sequencing of cancer ecosystems', date:'2024-05-19' },
    { journal:'Clinical Cancer Research', title:'A comprehensive review of liquid biopsy', date:'2024-05-18' },
  ];
  const ROADMAP = [
    { stage:'Technical Support', level:'Lv.1 - Lv.2', items:['掌握基础产品原理','能完成标准问答','建立 FAQ 与 SOP 框架'] },
    { stage:'Senior TS', level:'Lv.3 - Lv.4', items:['独立分析复杂案例','能做方案设计与培训','提升跨团队协作能力'] },
    { stage:'Application Scientist', level:'Lv.5 - Lv.6', items:['输出应用方案与内容','支持重点客户与项目','形成可复用的方法论'] },
  ];

  const defaultState = () => ({
    version: VERSION,
    currentTab: 'home',
    search: '',
    currentDate: localDateKey(new Date()),
    lastCheckinDate: null,
    completedDates: [],
    records: {},
    streak: 0,
    points: 0,
    dailyPointsHistory: [],
    note: '',
    taskDraft: { paper:false, product:false, case:false, summary:false },
    importedAt: null,
    lastExportAt: null
  });

  function loadState(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(!raw) return defaultState();
      const parsed = JSON.parse(raw);
      return normalizeState(parsed);
    }catch{
      return defaultState();
    }
  }

  function normalizeState(s){
    const base = defaultState();
    const out = Object.assign(base, s || {});
    out.version = VERSION;
    out.search = out.search || '';
    out.currentDate = localDateKey(new Date());
    out.records = out.records && typeof out.records === 'object' ? out.records : {};
    out.completedDates = Array.isArray(out.completedDates) ? out.completedDates : [];
    out.taskDraft = Object.assign({ paper:false, product:false, case:false, summary:false }, out.taskDraft || {});
    out.note = out.note || '';
    out.lastCheckinDate = out.lastCheckinDate || null;
    out.dailyPointsHistory = Array.isArray(out.dailyPointsHistory) ? out.dailyPointsHistory : [];
    recalcSummary(out);
    return out;
  }

  function saveState(){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  function toast(msg){
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toast._t);
    toast._t = setTimeout(() => el.classList.remove('show'), 1800);
  }

  function localDateKey(d){
    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,'0');
    const day = String(d.getDate()).padStart(2,'0');
    return `${y}-${m}-${day}`;
  }

  function parseDateKey(key){
    const [y,m,d] = key.split('-').map(Number);
    return new Date(y, m-1, d);
  }

  function prevDateKey(key){
    const d = parseDateKey(key);
    d.setDate(d.getDate()-1);
    return localDateKey(d);
  }

  function nextDateKey(key){
    const d = parseDateKey(key);
    d.setDate(d.getDate()+1);
    return localDateKey(d);
  }

  function getDayRecord(dateKey){
    if(!state.records[dateKey]){
      state.records[dateKey] = { tasks:{ paper:false, product:false, case:false, summary:false }, note:'', completed:false, points:0, completedAt:null };
    }
    const r = state.records[dateKey];
    if(!r.tasks) r.tasks = { paper:false, product:false, case:false, summary:false };
    if(typeof r.note !== 'string') r.note = '';
    if(typeof r.completed !== 'boolean') r.completed = false;
    if(typeof r.points !== 'number') r.points = 0;
    if(!r.completedAt) r.completedAt = null;
    return r;
  }

  function isRecordComplete(record){
    return TASKS.every(t => !!record.tasks[t.id]);
  }

  function recalcSummary(s = state){
    const completedDates = Object.keys(s.records || {})
      .filter(k => s.records[k] && s.records[k].completed)
      .sort();
    s.completedDates = completedDates;
    s.points = completedDates.reduce((sum, key) => sum + (Number(s.records[key]?.points) || 0), 0);
    s.dailyPointsHistory = completedDates.map(key => ({ date:key, points:Number(s.records[key]?.points) || 0 }));
    s.streak = computeCurrentStreak(s);
    return s;
  }

  function computeCurrentStreak(s = state){
    const completed = new Set(Object.keys(s.records || {}).filter(k => s.records[k] && s.records[k].completed));
    if(!completed.size) return 0;
    const today = localDateKey(new Date());
    const yesterday = prevDateKey(today);
    const latest = [...completed].sort().slice(-1)[0];
    if(latest !== today && latest !== yesterday) return 0;
    let streak = 0;
    let cursor = latest;
    while(completed.has(cursor)){
      streak++;
      cursor = prevDateKey(cursor);
    }
    return streak;
  }

  function downloadText(text, filename, mime){
    const blob = new Blob([text], { type:mime });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 800);
  }

  function saveLocalOnly(){
    state.currentDate = localDateKey(new Date());
    saveState();
    toast('已保存到浏览器本地');

  function computeRangeMetrics(days){
    const today = parseDateKey(localDateKey(new Date()));
    let completedDays = 0;
    let points = 0;
    let noteCount = 0;
    for(let i=0;i<days;i++){
      const d = new Date(today);
      d.setDate(d.getDate()-i);
      const key = localDateKey(d);
      const r = state.records[key];
      if(r && r.completed){
        completedDays++;
        points += Number(r.points) || 0;
        if((r.note || '').trim()) noteCount++;
      }
    }
    return { completedDays, points, noteCount, rate: Math.round((completedDays/days)*100) };
  }

  function buildRangeReport(days){
    const metrics = computeRangeMetrics(days);
    return metrics;
  }

  function buildWeeklyRows(){
    const labels = ['周一','周二','周三','周四','周五','周六','周日'];
    const current = parseDateKey(localDateKey(new Date()));
    const monday = new Date(current);
    const day = current.getDay() || 7;
    monday.setDate(current.getDate() - day + 1);
    const rows = [];
    for(let i=0;i<7;i++){
      const d = new Date(monday);
      d.setDate(monday.getDate()+i);
      const key = localDateKey(d);
      const r = state.records[key];
      const done = !!(r && r.completed);
      rows.push({
        label: labels[i],
        completed: done ? 1 : 0,
        total: 1,
        rate: done ? 100 : 0,
        date: key,
        status: done ? '已完成' : '未完成',
        completedCount: done ? 4 : 0,
        note: r && r.note ? r.note : ''
      });
    }
    return rows;
  }

  function buildCalendarRows(){
    const today = parseDateKey(localDateKey(new Date()));
    const start = new Date(today);
    start.setDate(today.getDate()-34);
    const rows = [];
    for(let i=0;i<35;i++){
      const d = new Date(start);
      d.setDate(start.getDate()+i);
      const key = localDateKey(d);
      const r = state.records[key];
      const completed = !!(r && r.completed);
      const partial = !!(r && !r.completed && Object.values(r.tasks || {}).some(Boolean));
      rows.push({
        date: key,
        status: completed ? '已完成' : partial ? '进行中' : '未开始',
        completedCount: completed ? 4 : partial ? Object.values(r.tasks || {}).filter(Boolean).length : 0,
        note: r && r.note ? r.note : ''
      });
    }
    return rows;
  }

  function completeIfReady(dateKey){
    const record = getDayRecord(dateKey);
    if(record.completed) return;
    if(!isRecordComplete(record)) return;
    const today = localDateKey(new Date());
    if(dateKey !== today) return;
    // finalize once per day
    record.completed = true;
    record.completedAt = new Date().toISOString();
    record.points = TASKS.reduce((sum, t) => sum + t.points, 0);
    state.lastCheckinDate = dateKey;
    recalcSummary(state);
    state.currentDate = dateKey;
    saveState();
    toast('今日打卡完成 +40 XP');
  }

    if(record.completed){

      return;
    }
    record.tasks[taskId] = !record.tasks[taskId];
    if(isRecordComplete(record)){

  function importDataFromFile(file){
    const name = (file.name || '').toLowerCase();
    if(name.endsWith('.json')){
      const reader = new FileReader();
      reader.onload = () => {
        try{
          const parsed = JSON.parse(String(reader.result || '{}'));
          mergeImportedJson(parsed);
          recalcSummary(state); saveState(); renderAll();
          toast('已导入 JSON 数据');
        }catch(e){
          alert('JSON 导入失败：' + e.message);
        }
      };
      reader.readAsText(file, 'utf-8');
      return;
    }
    if(name.endsWith('.xlsx') || name.endsWith('.xls')){
      if(typeof XLSX === 'undefined'){
        alert('Excel 库未加载，无法导入');
        return;
      }
      const reader = new FileReader();
      reader.onload = () => {
        try{
          const data = new Uint8Array(reader.result);
          const wb = XLSX.read(data, { type:'array' });
          mergeImportedWorkbook(wb);
          recalcSummary(state); saveState(); renderAll();
          toast('已导入 Excel 数据');
        }catch(e){
          alert('Excel 导入失败：' + e.message);
        }
      };
      reader.readAsArrayBuffer(file);
      return;
    }
    alert('仅支持 .json / .xlsx / .xls 文件');
  }

  function mergeImportedJson(parsed){
    if(!parsed || typeof parsed !== 'object') return;
    // Support both current schema and older exports
    const records = parsed.records && typeof parsed.records === 'object' ? parsed.records : null;
    if(records){
      for(const [date, value] of Object.entries(records)){
        state.records[date] = normalizeImportedRecord(value);
      }
    }
    if(parsed.note && !state.note) state.note = String(parsed.note);
    if(parsed.taskDraft && typeof parsed.taskDraft === 'object'){
      state.taskDraft = Object.assign(state.taskDraft, parsed.taskDraft);
    }
    if(Array.isArray(parsed.completedDates) && parsed.completedDates.length){
      // Merge dates conservatively; actual streak is recalculated from records
      parsed.completedDates.forEach(date => {
        if(!state.records[date]) state.records[date] = { tasks:{ paper:false, product:false, case:false, summary:false }, note:'', completed:true, points:40, completedAt:null };
      });
    }
  }

  function normalizeImportedRecord(value){
    const record = { tasks:{ paper:false, product:false, case:false, summary:false }, note:'', completed:false, points:0, completedAt:null };
    if(value && typeof value === 'object'){
      if(value.tasks && typeof value.tasks === 'object'){
        for(const k of Object.keys(record.tasks)) record.tasks[k] = !!value.tasks[k];
      }
      record.note = typeof value.note === 'string' ? value.note : '';
      record.completed = !!value.completed;
      record.points = Number(value.points) || 0;
      record.completedAt = value.completedAt || null;
    }
    return record;
  }

  function mergeImportedWorkbook(wb){
    const sheets = wb.SheetNames || [];
    const recordsSheet = sheets.find(s => /records/i.test(s));
    const todaySheet = sheets.find(s => /^today$/i.test(s));
    if(recordsSheet){
      const rows = XLSX.utils.sheet_to_json(wb.Sheets[recordsSheet], { defval:'' });
      rows.forEach(r => {
        const date = r['日期'] || r['date'];
        if(!date) return;
        state.records[String(date)] = {
          tasks:{
            paper: String(r['论文'] || r['Paper'] || r['paper'] || '') === '是' || String(r['任务完成数'] || '') === '4',
            product: true,
            case: true,
            summary: true
          },
          note: String(r['今日收获'] || r['note'] || ''),
          completed: String(r['完成'] || r['completed'] || '') === '是',
          points: Number(r['积分'] || r['points'] || 0) || 0,
          completedAt: r['完成时间'] || r['completedAt'] || null
        };
      });
    }
    if(todaySheet){
      const rows = XLSX.utils.sheet_to_json(wb.Sheets[todaySheet], { defval:'' });
      const today = localDateKey(new Date());
      const rec = getDayRecord(today);
      rows.forEach(r => {
        const task = String(r['任务'] || '').toLowerCase();
        const done = String(r['完成'] || '') === '是';
        if(task.includes('论文')) rec.tasks.paper = done;
        if(task.includes('产品')) rec.tasks.product = done;
        if(task.includes('case') || task.includes('案例')) rec.tasks.case = done;
        if(task.includes('总结')) rec.tasks.summary = done;
      });
    }
  }

            <h4>${p.name}</h4>
            <p>${p.desc}</p>
            <div style="display:flex;justify-content:space-between;margin-top:12px;font-size:12px;color:var(--muted)"><span>掌握度</span><span>${p.progress}%</span></div>
            <div class="progress-wrap" style="height:8px;margin-top:8px"><div class="progress-fill" style="width:${p.progress}%"></div></div>
            <div style="margin-top:8px;font-size:12px;color:var(--muted)">${p.modules} 模块</div>
          </div>`).join('')}</div></div>
      </section>
    `;

    const casePaperSection = `
      <section class="two-col">
        <div class="card">
          <div class="card-h">
            <div class="section-title">
              <div class="left"><h3>Troubleshooting 库</h3></div>
              <div class="toolbar"><span class="chip">${filterCount(CASES, state.search)} 条结果</span></div>
            </div>
            <p>把常见问题沉淀成可检索的案例库，方便快速定位与复盘。</p>
          </div>
          <div class="card-b">
            <div class="case-grid">
              ${filterCases(CASES, state.search).map(c => `
                <div class="case">
                  <div class="case-top">
                    <span class="badge blue">${c.tag}</span>
                    <span class="badge">${c.level}</span>
                  </div>
                  <h4>${c.title}</h4>
                  <p>${c.summary}</p>
                  <div style="margin-top:10px;font-size:12px;color:var(--muted)">更新于 ${c.date}</div>
                </div>
              `).join('') || `<div class="muted">没有找到相关案例。</div>`}
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-h">
            <h3>文献阅读管理</h3>
            <p>Nature、Cell、Clinical Cancer Research 等高价值阅读内容。</p>
          </div>
          <div class="card-b">
            <div class="paper-list">
              ${PAPERS.map(p => `
                <div class="paper">
                  <div class="icon-box">📄</div>
                  <div style="min-width:0;flex:1">
                    <div class="t1"><span>${p.journal}</span><span>${p.date}</span></div>
                    <div class="t2">${p.title}</div>
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
        </div>
      </section>
    `;

    const roadmapSection = `
      <section class="card" style="margin-bottom:18px">
        <div class="card-h"><h3>成长路线图</h3><p>Technical Support → Senior TS → Application Scientist</p></div>
        <div class="card-b">
          <div class="roadmap">
            ${ROADMAP.map((s, idx) => `
              <div class="step ${idx===1 ? 'active':''}">
                <h4>${s.stage}</h4>
                <div class="lvl">${s.level}</div>
                <ul>${s.items.map(i => `<li>${i}</li>`).join('')}</ul>
              </div>
            `).join('')}
          </div>
          <div style="margin-top:14px" class="report-box">
            <div class="section-title">
              <div class="left"><strong>当前阶段</strong><span class="chip">Senior TS · 60%</span></div>
              <span class="badge blue">成长中</span>
            </div>
            <div style="margin-top:10px" class="progress-wrap"><div class="progress-fill" style="width:60%;"></div></div>
            <div class="tiny" style="margin-top:10px">目标：复杂问题解决、独立支持、客户表达、项目协作。</div>
          </div>
        </div>
      </section>
    `;

    const notesSection = `
      <section class="card" style="margin-bottom:18px">
        <div class="card-h">
          <div class="section-title">
            <div class="left"><h3>今日收获记录</h3><span class="chip">本地保存 + 导出整页 Excel</span></div>
            <div class="toolbar">
              <button class="btn primary small" id="pageExcelBtn">导出整页 Excel</button>
            </div>
          </div>
          <p>建议把今天最重要的一条结论写下来，形成长期可搜索的知识资产。</p>
        </div>
        <div class="card-b">
          <div class="fields">
            <div class="field">
              <label>今日收获</label>
              <textarea id="noteInput" placeholder="例如：KingFisher 乙醇残留会影响 PCR 扩增。">${escapeHtml(record.note || '')}</textarea>
            </div>
            <div class="field">
              <label>补充备注</label>
              <textarea id="extraInput" placeholder="可记录客户需求、学习重点或明日计划。">${escapeHtml(state.extraNote || '')}</textarea>
            </div>
          </div>
          <div class="toolbar" style="margin-top:14px">
            <button class="btn ghost" id="saveNoteBtn">保存内容</button>
            <button class="btn good" id="exportNoteMdBtn">导出 Markdown</button>
            <button class="btn primary" id="exportNoteXlsxBtn">导出 Excel</button>
          </div>
          <div class="footer-note">
            <strong>说明：</strong>“保存内容”只会保存到浏览器本地，不会自动下载文件；“导出”才会生成文件。
          </div>
        </div>
      </section>
    `;

    const calendarSection = `
      <section class="card" style="margin-bottom:18px">
        <div class="card-h">
          <div class="section-title">
            <div class="left"><h3>GitHub 风格学习日历</h3><span class="chip">近 35 天</span></div>
            <span class="chip">按真实日期统计</span>
          </div>
          <p>显示过去 35 天的学习状态：已完成、进行中、未开始。</p>
        </div>
        <div class="card-b">
          <div class="calendar">
            ${calendar.map(d => `
              <div class="day ${d.status === '已完成' ? 'done' : d.status === '进行中' ? 'partial' : 'none'} ${d.date === today ? 'today' : ''}">
                <div class="num">${new Date(d.date + 'T00:00:00').getDate()}</div>
                <div class="status">${d.status}</div>
              </div>
            `).join('')}
          </div>
        </div>
      </section>
    `;

    let html = dashboardSection;
    const tab = state.currentTab;
    if(tab === 'home') html += taskSection + roadmapSection + casePaperSection + calendarSection + notesSection;
    if(tab === 'daily') html += taskSection + calendarSection + notesSection;
    if(tab === 'products') html += productSection + notesSection;
    if(tab === 'cases') html += casePaperSection + notesSection;
    if(tab === 'papers') html += casePaperSection + notesSection;
    if(tab === 'roadmap') html += roadmapSection + notesSection;
    if(tab === 'notes') html += notesSection + calendarSection;

    const content = document.getElementById('content');
    content.innerHTML = html;

    bindEvents();
    renderNav();
  }

  function filterCases(items, query){
    const q = (query || '').trim().toLowerCase();
    if(!q) return items;
    return items.filter(c => [c.tag, c.title, c.summary, c.level].some(x => String(x).toLowerCase().includes(q)));
  }
  function filterCount(items, query){ return filterCases(items, query).length; }

  function bindEvents(){
    document.querySelectorAll('[data-task]').forEach(btn => {
      btn.addEventListener('click', () => {
        const today = localDateKey(new Date());
        const id = btn.getAttribute('data-task');
        toggleTask(id);
        // toggleTask already rerenders
      });
    });

    const saveLocalBtn = document.getElementById('saveLocalBtn');
    if(saveLocalBtn) saveLocalBtn.onclick = () => { setCurrentNoteFromUI(); saveState(); toast('已保存到浏览器本地'); };

    const importBtn = document.getElementById('importBtn');
    const importFile = document.getElementById('importFile');
    if(importBtn && importFile){
      importBtn.onclick = () => importFile.click();
      importFile.onchange = () => {
        if(importFile.files && importFile.files[0]) importDataFromFile(importFile.files[0]);
        importFile.value = '';
      };
    }

    const exportMdBtn = document.getElementById('exportMdBtn');
    const exportXlsxBtn = document.getElementById('exportXlsxBtn');
    const pageExcelBtn = document.getElementById('pageExcelBtn');
    const exportNoteMdBtn = document.getElementById('exportNoteMdBtn');
    const exportNoteXlsxBtn = document.getElementById('exportNoteXlsxBtn');
    if(exportMdBtn) exportMdBtn.onclick = () => { setCurrentNoteFromUI(); exportMarkdown(); };
    if(exportXlsxBtn) exportXlsxBtn.onclick = () => { setCurrentNoteFromUI(); exportExcel(); };
    if(pageExcelBtn) pageExcelBtn.onclick = () => { setCurrentNoteFromUI(); exportExcel(); };
    if(exportNoteMdBtn) exportNoteMdBtn.onclick = () => { setCurrentNoteFromUI(); exportMarkdown(); };
    if(exportNoteXlsxBtn) exportNoteXlsxBtn.onclick = () => { setCurrentNoteFromUI(); exportExcel(); };

    const noteInput = document.getElementById('noteInput');
    const extraInput = document.getElementById('extraInput');
    if(noteInput) noteInput.addEventListener('input', () => { state.note = noteInput.value; saveState(); });
    if(extraInput) extraInput.addEventListener('input', () => { state.extraNote = extraInput.value; saveState(); });

    document.querySelectorAll('[data-tab]').forEach(btn => {
      btn.addEventListener('click', () => {
        state.currentTab = btn.getAttribute('data-tab');
        saveState();
        renderAll();
      });
    });
  }

  function renderAll(){
    renderNav();
    renderContent();
    const searchInput = document.getElementById('searchInput');
    const searchInput2 = document.getElementById('searchInput2');
    if(searchInput) searchInput.value = state.search || '';
    if(searchInput2) searchInput2.value = state.search || '';
    document.getElementById('streakValue').textContent = `${state.streak} 天`;
    const xp = Math.min(1000, state.points);
    document.getElementById('xpText').textContent = `${xp} / 1000 XP`;
    document.getElementById('xpBar').style.width = `${Math.min(100, Math.round(xp/10))}%`;
  }

  function closeSidebarOnMobile(){
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('overlay').classList.remove('show');
  }

  const state = loadState();
  ensureCurrentDay();
  recalcSummary(state);
  saveState();

  document.getElementById('menuBtn').addEventListener('click', () => {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('overlay').classList.toggle('show');
  });
  document.getElementById('overlay').addEventListener('click', closeSidebarOnMobile);

  const syncSearch = (val) => { state.search = val; saveState(); renderAll(); };
  document.getElementById('searchInput').addEventListener('input', e => syncSearch(e.target.value));
  document.getElementById('searchInput2').addEventListener('input', e => syncSearch(e.target.value));

  // Public helper for importing old data manually from console if needed
  window.BioSupportTracker = { state, saveState, recalcSummary };

  renderAll();
})();
</script>
</body>
</html>
