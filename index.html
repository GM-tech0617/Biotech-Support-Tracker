<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BioSupport - Technical Support Growth Tracker</title>
  <style>
    :root{
      --bg:#f5f8fc; --panel:#ffffff; --panel2:#f8fbff; --text:#0f172a; --muted:#64748b; --line:#dbe5f1;
      --brand:#113a7a; --brand2:#1d4ed8; --accent:#4f46e5; --good:#16a34a; --warn:#f59e0b; --purple:#7c3aed; --orange:#f97316;
      --shadow:0 10px 30px rgba(15,23,42,.08); --radius:22px;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:linear-gradient(135deg,#f6fbff 0%,#f6f8ff 45%,#f8fbff 100%);color:var(--text)}
    body{min-height:100vh}
    .app{display:flex;min-height:100vh}
    .sidebar{width:280px;background:linear-gradient(180deg,#082144 0%,#0b2c5f 100%);color:#fff;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;box-shadow:inset -1px 0 0 rgba(255,255,255,.06)}
    .brand{padding:24px 20px 16px;display:flex;align-items:center;gap:12px}
    .logo{width:44px;height:44px;border-radius:16px;background:rgba(255,255,255,.1);display:grid;place-items:center;font-size:22px}
    .brand h1{margin:0;font-size:22px;line-height:1.1}
    .brand p{margin:4px 0 0;font-size:12px;opacity:.7}
    .nav{padding:6px 12px;display:flex;flex-direction:column;gap:6px;flex:1}
    .nav button{border:0;background:transparent;color:rgba(255,255,255,.82);padding:14px 16px;border-radius:16px;text-align:left;display:flex;align-items:center;gap:12px;font-size:15px;cursor:pointer;transition:.18s}
    .nav button:hover{background:rgba(255,255,255,.08);color:#fff}
    .nav button.active{background:rgba(255,255,255,.14);color:#fff;box-shadow:inset 0 0 0 1px rgba(255,255,255,.08)}
    .sidebar-card{margin:12px;padding:18px;border-radius:22px;background:rgba(255,255,255,.08);box-shadow:inset 0 0 0 1px rgba(255,255,255,.07)}
    .sidebar-card .value{font-size:30px;font-weight:800;line-height:1;margin-top:6px}
    .sidebar-card .label{font-size:12px;opacity:.72}
    .xp{margin-top:14px}
    .xp-row{display:flex;justify-content:space-between;font-size:12px;opacity:.75;margin-bottom:8px}
    .xp-bar{height:8px;border-radius:999px;background:rgba(255,255,255,.12);overflow:hidden}
    .xp-bar > div{height:100%;width:65%;background:linear-gradient(90deg,#2dd4bf,#60a5fa)}
    .quote{margin:0 12px 18px;padding:16px 18px;border-radius:20px;background:rgba(255,255,255,.05);font-size:13px;line-height:1.6;opacity:.9}

    .main{flex:1;min-width:0}
    .topbar{position:sticky;top:0;z-index:20;backdrop-filter:blur(18px);background:rgba(246,249,253,.82);border-bottom:1px solid rgba(219,229,241,.9)}
    .topbar-inner{display:flex;align-items:center;gap:18px;padding:18px 26px}
    .menu{display:none;border:1px solid var(--line);background:#fff;border-radius:14px;padding:10px 12px;cursor:pointer}
    .welcome{flex:1}
    .welcome h2{margin:0;font-size:20px}
    .welcome p{margin:4px 0 0;color:var(--muted);font-size:13px}
    .search{flex:0 1 520px;display:flex;align-items:center;gap:10px;border:1px solid var(--line);background:#fff;border-radius:18px;padding:13px 16px;box-shadow:0 2px 12px rgba(15,23,42,.04)}
    .search input{border:0;outline:none;width:100%;font-size:14px;background:transparent}
    .user{display:flex;align-items:center;gap:12px;border:1px solid var(--line);background:#fff;border-radius:18px;padding:10px 12px;box-shadow:0 2px 12px rgba(15,23,42,.04)}
    .avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#3b82f6,#8b5cf6);color:#fff;display:grid;place-items:center;font-weight:800}
    .u-name{font-size:13px;font-weight:700}
    .u-role{font-size:12px;color:var(--muted)}

    .content{padding:22px 26px 28px}
    .grid-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:18px}
    .card{background:rgba(255,255,255,.95);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
    .stat{padding:18px 18px 16px}
    .stat .row{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
    .stat .k{font-size:13px;color:var(--muted)}
    .stat .v{font-size:30px;font-weight:800;line-height:1.1;margin-top:10px}
    .icon{font-size:20px}
    .section-grid{display:grid;grid-template-columns:1.1fr 1.4fr;gap:18px;margin-bottom:18px}
    .two-col{display:grid;grid-template-columns:1.6fr .9fr;gap:18px;margin-bottom:18px}
    .card-h{padding:18px 20px 0}
    .card-h h3{margin:0;font-size:20px}
    .card-h p{margin:6px 0 0;color:var(--muted);font-size:13px;line-height:1.5}
    .card-b{padding:18px 20px 20px}
    .progress-wrap{height:10px;background:#edf3fb;border-radius:999px;overflow:hidden}
    .progress-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--brand2),var(--accent))}
    .chip{display:inline-flex;align-items:center;gap:8px;padding:7px 11px;border-radius:999px;background:#f6f8ff;border:1px solid #e4e9fb;color:#3b4a7a;font-size:12px}
    .checklist{display:flex;flex-direction:column;gap:10px;margin-top:14px}
    .task{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:14px 14px;border-radius:18px;border:1px solid var(--line);cursor:pointer;background:#fff;transition:.18s}
    .task:hover{transform:translateY(-1px);box-shadow:0 10px 22px rgba(15,23,42,.06)}
    .task.active{background:#eff6ff;border-color:#bfdbfe}
    .task .left{display:flex;align-items:flex-start;gap:12px}
    .check{width:22px;height:22px;border-radius:999px;border:2px solid #cbd5e1;display:grid;place-items:center;flex:none;background:#fff}
    .task.active .check{background:#1d4ed8;border-color:#1d4ed8;color:#fff}
    .task .title{font-weight:700}
    .task .meta{font-size:12px;color:var(--muted);margin-top:3px}
    .badge{padding:6px 10px;border-radius:999px;font-size:12px;border:1px solid var(--line);background:#f8fafc;color:#475569;white-space:nowrap}
    .badge.good{background:#ecfdf5;border-color:#bbf7d0;color:#166534}
    .badge.blue{background:#eff6ff;border-color:#bfdbfe;color:#1d4ed8}
    .badge.purple{background:#f5f3ff;border-color:#ddd6fe;color:#6d28d9}
    .badge.orange{background:#fff7ed;border-color:#fed7aa;color:#c2410c}
    .mini-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
    .mini{border:1px solid var(--line);border-radius:18px;padding:15px;background:linear-gradient(180deg,#fff,#fbfdff)}
    .mini .lbl{font-size:12px;color:var(--muted)}
    .mini .big{margin-top:8px;font-size:22px;font-weight:800}
    .mini .bar{height:8px;background:#edf3fb;border-radius:999px;overflow:hidden;margin-top:10px}
    .mini .bar>div{height:100%;border-radius:999px}
    .roadmap{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
    .step{border:1px solid var(--line);border-radius:20px;padding:16px;background:#fff}
    .step.active{background:#eff6ff;border-color:#bfdbfe}
    .step h4{margin:0;font-size:16px}
    .step .lvl{margin-top:4px;font-size:12px;color:var(--muted)}
    .step ul{margin:14px 0 0;padding:0 0 0 18px;color:#475569;line-height:1.7;font-size:13px}
    .products{display:grid;grid-template-columns:repeat(5,1fr);gap:14px}
    .product{border:1px solid var(--line);border-radius:22px;padding:16px;background:#fff;min-height:210px}
    .product .img{height:86px;border-radius:18px;background:linear-gradient(180deg,#f8fbff,#edf3fb);border:1px solid #e5edf8;display:grid;place-items:center;font-size:34px;margin-bottom:12px}
    .product h4{margin:0;font-size:16px}
    .product p{margin:8px 0 0;color:var(--muted);font-size:12px;line-height:1.6}
    .case-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
    .case{border:1px solid var(--line);border-radius:20px;padding:16px;background:#fff}
    .case-top{display:flex;justify-content:space-between;align-items:center;gap:10px}
    .case h4{margin:10px 0 0;font-size:16px}
    .case p{margin:8px 0 0;color:var(--muted);font-size:13px;line-height:1.6}
    .paper-list{display:flex;flex-direction:column;gap:10px}
    .paper{display:flex;gap:12px;align-items:center;border:1px solid var(--line);background:#fff;border-radius:18px;padding:12px}
    .paper .icon-box{width:48px;height:48px;border-radius:16px;background:#eef4ff;display:grid;place-items:center;font-size:20px;color:#2563eb}
    .paper .t1{font-size:12px;color:var(--muted);display:flex;justify-content:space-between;gap:10px}
    .paper .t2{margin-top:4px;font-size:14px;font-weight:700;line-height:1.4}
    .journal-cta{margin-top:10px}
    .fields{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:8px}
    .field textarea{width:100%;min-height:120px;padding:14px 14px;border-radius:18px;border:1px solid var(--line);outline:none;resize:vertical;font:inherit;background:#fff}
    .field input{width:100%;padding:14px 14px;border-radius:18px;border:1px solid var(--line);outline:none;font:inherit;background:#fff}
    .section-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
    .btn{border:0;border-radius:16px;padding:12px 16px;font-weight:700;cursor:pointer;transition:.18s;font:inherit}
    .btn:hover{transform:translateY(-1px)}
    .btn.primary{background:linear-gradient(90deg,var(--brand2),var(--accent));color:#fff}
    .btn.ghost{background:#fff;border:1px solid var(--line);color:var(--text)}
    .footer-note{margin-top:18px;padding:14px 16px;border-radius:18px;background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;font-size:13px}

    .mobile-search{display:none;margin:0 26px 16px}
    .mobile-search .search{max-width:none;flex:1}

    @media (max-width: 1280px){
      .grid-stats,.mini-grid,.products{grid-template-columns:repeat(2,1fr)}
      .section-grid,.two-col,.roadmap{grid-template-columns:1fr}
      .case-grid,.fields{grid-template-columns:1fr}
    }
    @media (max-width: 860px){
      .sidebar{position:fixed;left:-290px;z-index:40;transition:.25s ease}
      .sidebar.open{left:0}
      .menu{display:inline-flex}
      .topbar-inner{padding:14px 16px}
      .content{padding:14px 16px 22px}
      .mobile-search{display:block;margin:0 16px 12px}
      .search{flex:1}
      .welcome{display:none}
      .user .u-meta{display:none}
      .grid-stats{grid-template-columns:1fr}
      .mini-grid,.products{grid-template-columns:1fr}
      .mobile-overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.38);z-index:30}
      .mobile-overlay.show{display:block}
    }
  </style>
</head>
<body>
  <div class="mobile-overlay" id="overlay"></div>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="logo">🧬</div>
        <div>
          <h1>BioSupport</h1>
          <p>Learn · Solve · Grow</p>
        </div>
      </div>

      <div class="nav" id="nav"></div>

      <div class="sidebar-card">
        <div class="label">连续打卡</div>
        <div class="value" id="streakValue">23 天</div>
        <div class="xp">
          <div class="xp-row"><span>Lv. 12 技术支持专家</span><span id="xpText">650 / 1000 XP</span></div>
          <div class="xp-bar"><div id="xpBar"></div></div>
        </div>
      </div>

      <p class="quote">“持续学习，是成为专家的唯一捷径。”<br>— Grace</p>
    </aside>

    <main class="main">
      <div class="topbar">
        <div class="topbar-inner">
          <button class="menu" id="menuBtn">☰</button>
          <div class="welcome">
            <h2>欢迎回来，Grace!</h2>
            <p>今天也是成长的一天，保持学习节奏。</p>
          </div>
          <div class="search" role="search">
            <span>🔎</span>
            <input id="searchInput" placeholder="搜索产品、案例、文章、笔记..." />
          </div>
          <div class="user">
            <div class="avatar">GM</div>
            <div class="u-meta">
              <div class="u-name">Grace Ma</div>
              <div class="u-role">Technical Support</div>
            </div>
          </div>
        </div>
      </div>

      <div class="mobile-search">
        <div class="search">
          <span>🔎</span>
          <input id="searchInput2" placeholder="搜索产品、案例、文章、笔记..." />
        </div>
      </div>

      <div class="content" id="content"></div>
    </main>
  </div>

  <script>
    const STORAGE_KEY = 'biosupport-ghpages-v1';
    const state = loadState() || {
      currentTab: 'home',
      checked: { paper: true, product: true, case: true, summary: true },
      note: '',
      goal: '本月目标：提升产品应用能力、Troubleshooting 能力和文献阅读沉淀能力',
      xp: 650,
      streak: 23,
      monthlyProgress: 81,
      search: ''
    };

    const navItems = [
      { key: 'home', label: '首页', icon: '🏠' },
      { key: 'daily', label: '每日打卡', icon: '📅' },
      { key: 'products', label: '产品学习', icon: '🔬' },
      { key: 'cases', label: 'Troubleshooting 库', icon: '🧰' },
      { key: 'papers', label: '文献管理', icon: '📚' },
      { key: 'roadmap', label: '成长路线', icon: '📈' },
      { key: 'notes', label: '我的笔记', icon: '📝' },
    ];

    const products = [
      { name:'PCR / qPCR', progress:80, modules:'8/10 模块', desc:'基础原理、标准曲线、熔解曲线与常见失败原因' },
      { name:'NGS', progress:65, modules:'13/20 模块', desc:'文库构建、上机、数据质控与常见排障' },
      { name:'Flow Cytometry', progress:70, modules:'7/10 模块', desc:'补偿、门控、抗体选择与仪器维护' },
      { name:'KingFisher', progress:75, modules:'6/8 模块', desc:'磁珠提取、样本纯化、污染与回收率优化' },
      { name:'Orbitrap MS', progress:60, modules:'9/15 模块', desc:'蛋白质组、扫描模式、参数设置与数据分析' },
    ];

    const cases = [
      { tag:'qPCR', title:'Ct 值异常偏高或无扩增', date:'2024-05-20', level:'高频问题', summary:'排查模板质量、引物设计、反应体系、退火温度和污染可能。' },
      { tag:'NGS', title:'文库主峰异常或无有效数据', date:'2024-05-18', level:'中等频率', summary:'重点关注片段分布、接头连接效率、定量偏差和测序指标。' },
      { tag:'Flow', title:'信号弱或背景高', date:'2024-05-16', level:'高频问题', summary:'检查补偿、PMT、染色条件、洗涤步骤和细胞状态。' },
      { tag:'KingFisher', title:'提取产量低', date:'2024-05-15', level:'中等频率', summary:'关注磁珠混匀、洗涤次数、样本输入量和乙醇残留。' },
    ];

    const papers = [
      { journal:'Nature', title:'Single-cell multiomic analysis of human tissues', date:'2024-05-20' },
      { journal:'Cell', title:'Spatial multi-omics sequencing of cancer ecosystems', date:'2024-05-19' },
      { journal:'Clinical Cancer Research', title:'A comprehensive review of liquid biopsy', date:'2024-05-18' },
    ];

    const roadmap = [
      { stage:'Technical Support', level:'Lv.1 - Lv.2', items:['掌握基础产品原理','能完成标准问答','建立 FAQ 与 SOP 框架'] },
      { stage:'Senior TS', level:'Lv.3 - Lv.4', items:['独立分析复杂案例','能做方案设计与培训','提升跨团队协作能力'] },
      { stage:'Application Scientist', level:'Lv.5 - Lv.6', items:['输出应用方案与内容','支持重点客户与项目','形成可复用的方法论'] },
    ];

    const tasks = [
      { id:'paper', label:'阅读一篇论文摘要', minutes:'10 min', badge:'文献阅读', cls:'blue' },
      { id:'product', label:'学习一个产品知识点', minutes:'10 min', badge:'产品学习', cls:'good' },
      { id:'case', label:'分析一个 Troubleshooting Case', minutes:'10 min', badge:'案例分析', cls:'purple' },
      { id:'summary', label:'总结并沉淀到知识库', minutes:'10 min', badge:'知识总结', cls:'orange' },
    ];

    const weekly = [
      { label:'产品学习', value:5, total:7, color:'linear-gradient(90deg,#4f46e5,#2563eb)' },
      { label:'案例分析', value:4, total:5, color:'linear-gradient(90deg,#16a34a,#22c55e)' },
      { label:'文献阅读', value:3, total:5, color:'linear-gradient(90deg,#7c3aed,#a855f7)' },
      { label:'知识总结', value:4, total:5, color:'linear-gradient(90deg,#f97316,#fb923c)' },
    ];

    function loadState(){ try{ return JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null'); } catch { return null; } }
    function saveState(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

    function renderNav(){
      const nav = document.getElementById('nav');
      nav.innerHTML = navItems.map(item => `
        <button class="${state.currentTab===item.key ? 'active':''}" data-tab="${item.key}">
          <span style="width:22px;text-align:center">${item.icon}</span>
          <span>${item.label}</span>
        </button>
      `).join('');
      nav.querySelectorAll('button').forEach(btn => btn.addEventListener('click', ()=>{
        state.currentTab = btn.dataset.tab;
        saveState(); renderAll(); closeMobileSidebar();
      }));
    }

    function taskMarkup(){
      return tasks.map(t => {
        const active = !!state.checked[t.id];
        return `
          <div class="task ${active ? 'active':''}" data-task="${t.id}">
            <div class="left">
              <div class="check">${active ? '✓' : ''}</div>
              <div>
                <div class="title">${t.label}</div>
                <div class="meta">${t.minutes}</div>
              </div>
            </div>
            <span class="badge ${t.cls}">${active ? '已完成' : t.badge}</span>
          </div>
        `;
      }).join('');
    }

    function productMarkup(){
      return products.map(p=>`
        <div class="product">
          <div class="img">🧪</div>
          <h4>${p.name}</h4>
          <p>${p.desc}</p>
          <div style="display:flex;justify-content:space-between;margin-top:12px;font-size:12px;color:var(--muted)"><span>掌握度</span><span>${p.progress}%</span></div>
          <div class="progress-wrap" style="height:8px;margin-top:8px"><div class="progress-fill" style="width:${p.progress}%"></div></div>
          <div style="margin-top:8px;font-size:12px;color:var(--muted)">${p.modules}</div>
        </div>
      `).join('');
    }

    function casesMarkup(filter=''){
      const q = filter.trim().toLowerCase();
      return cases.filter(c => !q || [c.tag,c.title,c.summary,c.level].some(x=>x.toLowerCase().includes(q))).map(c=>`
        <div class="case">
          <div class="case-top">
            <span class="badge blue">${c.tag}</span>
            <span class="badge">${c.level}</span>
          </div>
          <h4>${c.title}</h4>
          <p>${c.summary}</p>
          <div style="margin-top:10px;font-size:12px;color:var(--muted)">更新于 ${c.date}</div>
        </div>
      `).join('') || `<div class="card-b" style="color:var(--muted)">没有找到相关案例。</div>`;
    }

    function papersMarkup(){
      return papers.map(p=>`
        <div class="paper">
          <div class="icon-box">📄</div>
          <div style="min-width:0;flex:1">
            <div class="t1"><span>${p.journal}</span><span>${p.date}</span></div>
            <div class="t2">${p.title}</div>
          </div>
        </div>
      `).join('');
    }

    function roadmapMarkup(){
      return roadmap.map((s,idx)=>`
        <div class="step ${idx===1 ? 'active':''}">
          <h4>${s.stage}</h4>
          <div class="lvl">${s.level}</div>
          <ul>${s.items.map(i=>`<li>${i}</li>`).join('')}</ul>
        </div>
      `).join('');
    }

    function renderContent(){
      const content = document.getElementById('content');
      const completedCount = tasks.filter(t=>state.checked[t.id]).length;
      const progress = Math.round(completedCount / tasks.length * 100);
      const xpPct = Math.min(100, Math.round(state.xp / 10));
      document.getElementById('xpBar').style.width = xpPct + '%';
      document.getElementById('xpText').textContent = `${state.xp} / 1000 XP`;
      document.getElementById('streakValue').textContent = `${state.streak} 天`;

      const taskSection = `
        <section class="section-grid">
          <div class="card">
            <div class="card-h">
              <h3>今日打卡</h3>
              <p>保留原有 4 项打卡：论文、产品、Case、总结。完成后自动累计积分和连续打卡。</p>
            </div>
            <div class="card-b">
              <div style="display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:14px">
                <span class="chip">每日目标（4/4）</span>
                <span class="chip">今日进度 ${progress}%</span>
              </div>
              <div class="checklist">${taskMarkup()}</div>
              <div style="margin-top:16px;background:#f8fbff;border:1px solid #dbe5f1;border-radius:18px;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;gap:10px">
                <div>今日完成后可获得 <strong>+40 XP</strong></div>
                <button class="btn primary" id="resetBtn">重置今日</button>
              </div>
            </div>
          </div>

          <div class="card">
            <div class="card-h">
              <h3>本周学习概览</h3>
              <p>产品学习、案例分析、文献阅读、知识总结四条主线并行推进。</p>
            </div>
            <div class="card-b">
              <div class="mini-grid">
                ${weekly.map(w=>`
                  <div class="mini">
                    <div class="lbl">${w.label}</div>
                    <div class="big">${w.value}/${w.total}</div>
                    <div class="bar"><div style="width:${Math.round(w.value/w.total*100)}%;background:${w.color}"></div></div>
                  </div>
                `).join('')}
              </div>
              <div style="margin-top:14px;display:grid;grid-template-columns:repeat(4,1fr);gap:10px">
                <div class="chip">连续打卡 ${state.streak} 天</div>
                <div class="chip">累计学习 128.5 小时</div>
                <div class="chip">本月完成率 81%</div>
                <div class="chip">本月积分 1240</div>
              </div>
            </div>
          </div>
        </section>
      `;

      const productSection = `
        <section class="card" style="margin-bottom:18px">
          <div class="card-h"><h3>产品学习中心</h3><p>Thermo 产品学习模块：PCR、NGS、Flow、KingFisher、Orbitrap 等。</p></div>
          <div class="card-b"><div class="products">${productMarkup()}</div></div>
        </section>
      `;

      const casePaperSection = `
        <section class="two-col">
          <div class="card">
            <div class="card-h"><h3>Troubleshooting 库</h3><p>把案例沉淀成可检索、可复用的排障知识库。</p></div>
            <div class="card-b">
              <div class="case-grid" id="caseGrid">${casesMarkup(state.search)}</div>
            </div>
          </div>
          <div class="card">
            <div class="card-h"><h3>文献阅读管理</h3><p>Nature、Cell、Clinical Cancer Research 等高价值阅读内容。</p></div>
            <div class="card-b">
              <div class="paper-list">${papersMarkup()}</div>
              <div class="journal-cta"><button class="btn primary" style="width:100%">＋ 添加新文献</button></div>
            </div>
          </div>
        </section>
      `;

      const roadmapSection = `
        <section class="card" style="margin-bottom:18px">
          <div class="card-h"><h3>成长路线图</h3><p>Technical Support → Senior TS → Application Scientist</p></div>
          <div class="card-b">
            <div class="roadmap">${roadmapMarkup()}</div>
            <div style="margin-top:14px;background:#f8fbff;border:1px solid #dbe5f1;border-radius:18px;padding:16px">
              <div style="display:flex;justify-content:space-between;gap:10px;align-items:center;font-size:13px;color:var(--muted)"><span>当前阶段：Senior TS（60%）</span><span>目标进度</span></div>
              <div class="progress-wrap" style="margin-top:8px"><div class="progress-fill" style="width:60%;background:linear-gradient(90deg,#1d4ed8,#7c3aed)"></div></div>
            </div>
          </div>
        </section>
      `;

      const notesSection = `
        <section class="card" style="margin-bottom:18px">
          <div class="card-h"><h3>我的笔记</h3><p>把工作间隙的学习变成长期的知识资产。</p></div>
          <div class="card-b">
            <div class="fields">
              <div class="field">
                <label>本月目标</label>
                <textarea id="goalInput">${escapeHtml(state.goal)}</textarea>
              </div>
              <div class="field">
                <label>今日收获（一句话）</label>
                <textarea id="noteInput" placeholder="记录今天最重要的一条结论">${escapeHtml(state.note)}</textarea>
              </div>
            </div>
            <div class="section-actions">
              <button class="btn primary" id="saveNoteBtn">保存笔记</button>
              <button class="btn ghost" id="exportBtn">导出 JSON</button>
            </div>
            <div class="footer-note">建议：每天只需 40 分钟，长期坚持会形成可复用的产品知识库、案例库与方法论。</div>
          </div>
        </section>
      `;

      const dashboardSection = `
        <section class="grid-stats">
          ${[
            {label:'连续打卡', value:`${state.streak} 天`, icon:'🔥'},
            {label:'累计学习', value:'128.5 小时', icon:'⏱️'},
            {label:'本月完成率', value:'81%', icon:'🎯'},
            {label:'本月积分', value:'1240', icon:'⭐'},
          ].map(s=>`
            <div class="card stat"><div class="row"><div class="k">${s.label}</div><div class="icon">${s.icon}</div></div><div class="v">${s.value}</div></div>
          `).join('')}
        </section>
      `;

      const tab = state.currentTab;
      let html = dashboardSection;
      if (tab === 'home') html += taskSection + roadmapSection + casePaperSection;
      if (tab === 'daily') html += taskSection + notesSection;
      if (tab === 'products') html += productSection + notesSection;
      if (tab === 'cases') html += casePaperSection + notesSection;
      if (tab === 'papers') html += casePaperSection + notesSection;
      if (tab === 'roadmap') html += roadmapSection + notesSection;
      if (tab === 'notes') html += notesSection;
      content.innerHTML = html;

      bindContentEvents();
      renderNav();
    }

    function bindContentEvents(){
      document.querySelectorAll('[data-task]').forEach(el => {
        el.addEventListener('click', () => {
          const id = el.dataset.task;
          state.checked[id] = !state.checked[id];
          state.xp = Math.max(0, state.xp + (state.checked[id] ? 40 : -40));
          if (Object.values(state.checked).every(Boolean)) state.streak += 1;
          saveState();
          renderAll();
        });
      });
      const resetBtn = document.getElementById('resetBtn');
      if (resetBtn) resetBtn.onclick = () => { state.checked = {}; saveState(); renderAll(); };
      const saveNoteBtn = document.getElementById('saveNoteBtn');
      if (saveNoteBtn) saveNoteBtn.onclick = () => {
        state.goal = document.getElementById('goalInput').value;
        state.note = document.getElementById('noteInput').value;
        saveState();
        alert('已保存到浏览器本地存储。');
      };
      const exportBtn = document.getElementById('exportBtn');
      if (exportBtn) exportBtn.onclick = () => {
        state.goal = document.getElementById('goalInput').value;
        state.note = document.getElementById('noteInput').value;
        const blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'biosupport-data.json'; a.click();
        setTimeout(()=>URL.revokeObjectURL(url), 1000);
      };
      const goalInput = document.getElementById('goalInput');
      const noteInput = document.getElementById('noteInput');
      if (goalInput) goalInput.addEventListener('input', (e)=>{ state.goal = e.target.value; saveState(); });
      if (noteInput) noteInput.addEventListener('input', (e)=>{ state.note = e.target.value; saveState(); });
    }

    function renderAll(){
      renderNav();
      renderContent();
      document.querySelectorAll('.nav button').forEach(btn => btn.classList.toggle('active', btn.dataset.tab === state.currentTab));
      document.getElementById('searchInput').value = state.search;
      document.getElementById('searchInput2').value = state.search;
    }

    function escapeHtml(s=''){ return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
    function closeMobileSidebar(){ document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('show'); }

    document.getElementById('menuBtn').addEventListener('click', ()=>{
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('overlay').classList.toggle('show');
    });
    document.getElementById('overlay').addEventListener('click', closeMobileSidebar);
    const syncSearch = (val)=>{ state.search = val; saveState(); renderAll(); };
    document.getElementById('searchInput').addEventListener('input', e => syncSearch(e.target.value));
    document.getElementById('searchInput2').addEventListener('input', e => syncSearch(e.target.value));

    renderAll();
  </script>
</body>
</html>
